<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Juego Web</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #eee; }
        .container { max-width: 980px; margin: 0 auto; padding: 24px; }
        .toolbar { margin-bottom: 18px; }
        .toolbar a { color: #76c7ff; text-decoration: none; padding: 10px 16px; border: 1px solid #2d6cd2; border-radius: 8px; background: #17203c; }
        .toolbar a:hover { background: #243c75; }
        h1 { margin-bottom: 6px; }
        .info { color: #ccc; margin-bottom: 16px; }
        .message { background: #200; border: 1px solid #441; padding: 16px; border-radius: 12px; margin: 18px 0; }
        .hint { margin-top: 16px; color: #aaa; }
        canvas { display: block; margin: 0 auto; border: 2px solid #333; border-radius: 12px; background: #000; }
        .audio-button { margin-left: 14px; padding: 10px 16px; background: #2979ff; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        .audio-button:hover { background: #1f57c0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <a href="index.html">← Volver al menú</a>
            <button id="audioButton" class="audio-button">Activar música</button>
        </div>
        <h1 id="gameTitle">Cargando juego...</h1>
        <p id="gameDescription" class="info"></p>
        <div id="gameContainer">
            <canvas id="gameCanvas"></canvas>
        </div>
        <div id="invalidMessage" class="message" style="display:none;"></div>
        <p class="hint">Presiona las teclas mostradas en pantalla para jugar.</p>
    </div>
    <script src="js/game-loader.js"></script>
</body>
</html>
